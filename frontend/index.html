<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mars Rover Navigator</title>
    <style>
        :root {
            --bg-color: #050505;
            --panel-bg: rgba(20, 25, 40, 0.95);
            --accent-cyan: #00f3ff;
            --accent-red: #ff3333;
            --grid-line: rgba(0, 243, 255, 0.15);
            --text-main: #d0d0d0;
            --glass-border: 1px solid rgba(0, 243, 255, 0.3);
            --cell-size: 45px;
            --rover-size: 36px;
        }

        body {
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at 50% 50%, #1a0b0b 0%, #000000 100%);
            color: var(--text-main);
            font-family: 'Segoe UI', 'Roboto', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow-x: hidden;
        }

        body::after {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%);
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 100;
        }

        h1 {
            font-weight: 300;
            letter-spacing: 5px;
            color: var(--accent-cyan);
            text-shadow: 0 0 15px var(--accent-cyan);
            margin: 20px 0;
            text-transform: uppercase;
            font-size: clamp(1.2rem, 4vw, 1.8rem);
            text-align: center;
        }

        .dashboard {
            display: flex;
            gap: 30px;
            padding: 10px;
            z-index: 10;
            align-items: flex-start;
        }

        .grid-wrapper {
            padding: 15px;
            border: var(--glass-border);
            border-radius: 10px;
            background: var(--panel-bg);
            box-shadow: 0 0 40px rgba(0, 243, 255, 0.05);
            position: relative;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(10, var(--cell-size));
            grid-template-rows: repeat(10, var(--cell-size));
            gap: 1px;
            background-color: var(--grid-line);
            border: 1px solid var(--accent-cyan);
            position: relative;
        }

        .cell {
            background-color: rgba(10, 10, 15, 0.8);
            width: var(--cell-size);
            height: var(--cell-size);
            position: relative;
        }

        .cell::before {
            content: '+';
            position: absolute;
            color: rgba(0, 243, 255, 0.2);
            font-size: 10px;
            top: 2px;
            left: 2px;
        }

        .rover {
            position: absolute;
            width: var(--rover-size);
            height: var(--rover-size);
            background: radial-gradient(circle, var(--accent-red) 30%, #800000 100%);
            border: 2px solid #fff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 20px var(--accent-red);
            transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
            z-index: 50;
            justify-self: center;
            align-self: center;
            grid-column: 1 / span 1;
            grid-row: 10 / span 1;
        }

        .rover::after {
            content: '';
            border-left: 6px solid transparent;
            border-right: 6px solid transparent;
            border-bottom: 14px solid #fff;
            position: absolute;
            transform: translateY(-2px);
        }

        .controls-panel {
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 300px;
        }

        .data-display {
            background: rgba(0, 0, 0, 0.6);
            border: var(--glass-border);
            border-left: 4px solid var(--accent-cyan);
            padding: 15px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.9rem;
            color: var(--accent-cyan);
        }

        .data-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            border-bottom: 1px solid rgba(0, 243, 255, 0.1);
        }

        .input-group {
            display: flex;
            gap: 10px;
        }

        input {
            flex-grow: 1;
            background: rgba(0,0,0,0.5);
            border: 1px solid #444;
            color: white;
            padding: 12px;
            font-family: monospace;
            font-size: 1.1rem;
            text-transform: uppercase;
            border-radius: 4px;
        }

        input:focus { outline: none; border-color: var(--accent-cyan); }

        button {
            padding: 12px;
            font-weight: bold;
            text-transform: uppercase;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.9rem;
        }

        .btn-primary {
            background: var(--accent-cyan);
            color: #000;
            box-shadow: 0 0 10px rgba(0, 243, 255, 0.3);
        }
        .btn-primary:hover:not(:disabled) { background: #fff; }
        .btn-primary:disabled { background: #333; color: #666; cursor: not-allowed; }

        .btn-danger {
            background: rgba(255, 51, 51, 0.1);
            border: 1px solid var(--accent-red);
            color: var(--accent-red);
            width: 100%;
            padding: 15px;
            transition: 0.3s;
        }

        .btn-danger:hover {
            background: var(--accent-red);
            color: white;
            box-shadow: 0 0 20px var(--accent-red);
        }

        .error-message {
            color: var(--accent-red);
            font-size: 0.8rem;
            margin-top: 10px;
            display: none;
        }

        @media (max-width: 850px) {
            .dashboard {
                flex-direction: column;
                align-items: center;
                gap: 20px;
                width: 100%;
            }
            .controls-panel {
                width: 100%;
                max-width: 350px;
            }
            :root {
                --cell-size: 32px;
                --rover-size: 24px;
            }
            h1 { font-size: 1.5rem; }
        }
    </style>
</head>
<body>

<h1>Mars Rover<span style="font-size: 1.0em; color: white"> Navigator</span></h1>

<div class="dashboard">
    <div class="grid-wrapper">
        <div class="grid-container" id="marsGrid"></div>
    </div>

    <div class="controls-panel">
        <div class="data-display">
            <div class="data-row"><span>SYSTEM</span> <span id="sysStatus" style="color:var(--accent-cyan)">CONNECTING...</span></div>
            <div class="data-row"><span>COORDS</span> <span id="coords">0, 0</span></div>
            <div class="data-row"><span>HEADING</span> <span id="heading">N</span></div>
        </div>

        <div class="input-group">
            <input type="text" id="cmdInput" placeholder="COMMANDS (e.g. FFRF)" maxlength="30">
            <button class="btn-primary" id="sendBtn" onclick="runSequence()">SEND</button>
        </div>

        <div class="error-message" id="errorMsg"></div>

        <button class="btn-danger" onclick="resetRover()">
            ⚠ EMERGENCY RESET
        </button>
    </div>
</div>

<script>
    const GRID_SIZE = 10;
    const ANIMATION_DELAY = 400;
    const API_BASE = 'http://localhost:8080/api';

    const grid = document.getElementById('marsGrid');
    const roverEl = document.createElement('div');
    roverEl.className = 'rover';

    function initGrid() {
        grid.innerHTML = '';
        for (let i = 0; i < GRID_SIZE * GRID_SIZE; i++) {
            let cell = document.createElement('div');
            cell.className = 'cell';
            grid.appendChild(cell);
        }
        grid.appendChild(roverEl);
    }

    function updateRoverUI(x, y, dir) {
        const col = x + 1;
        const row = GRID_SIZE - y;
        roverEl.style.gridColumn = `${col} / span 1`;
        roverEl.style.gridRow = `${row} / span 1`;

        let deg = 0;
        if (dir === 'E') deg = 90;
        if (dir === 'S') deg = 180;
        if (dir === 'W') deg = -90;
        roverEl.style.transform = `rotate(${deg}deg)`;

        document.getElementById('coords').innerText = `${x}, ${y}`;
        document.getElementById('heading').innerText = dir;
        document.getElementById('sysStatus').textContent = 'ONLINE';
        document.getElementById('sysStatus').style.color = 'var(--accent-cyan)';
    }

    function showError(message) {
        const errorEl = document.getElementById('errorMsg');
        errorEl.textContent = message;
        errorEl.style.display = 'block';
        setTimeout(() => {
            errorEl.style.display = 'none';
        }, 3000);
    }

    function sleep(ms) {
        return new Promise(resolve => setTimeout(resolve, ms));
    }

    async function fetchStatus() {
        try {
            const res = await fetch(`${API_BASE}/status`);
            if (!res.ok) throw new Error('Backend not responding');
            const data = await res.json();
            updateRoverUI(data.x, data.y, data.direction);
        } catch (e) {
            console.error("Signal Lost:", e);
            document.getElementById('sysStatus').textContent = 'OFFLINE';
            document.getElementById('sysStatus').style.color = 'var(--accent-red)';
            showError('Cannot connect to rover backend');
        }
    }

    async function sendSingleCommand(char) {
        try {
            const res = await fetch(`${API_BASE}/move?commands=${char}`, { method: 'POST' });
            if (!res.ok) throw new Error('Command failed');
            const data = await res.json();
            updateRoverUI(data.x, data.y, data.direction);
        } catch (e) {
            console.error("TX Failed:", e);
            showError('Command transmission failed');
            throw e;
        }
    }

    async function runSequence() {
        const input = document.getElementById('cmdInput');
        const rawCmds = input.value.toUpperCase().replace(/[^LFR]/g, '');

        if (!rawCmds) return;

        const btn = document.getElementById('sendBtn');
        btn.disabled = true;
        btn.innerText = "EXECUTING...";

        try {
            for (let char of rawCmds) {
                await sendSingleCommand(char);
                await sleep(ANIMATION_DELAY);
            }
        } catch (e) {
            // Error already handled in sendSingleCommand
        }

        input.value = '';
        btn.disabled = false;
        btn.innerText = "SEND";
    }

    async function resetRover() {
        if (!confirm("CONFIRM SYSTEM RESET?")) return;
        try {
            const res = await fetch(`${API_BASE}/reset`, { method: 'POST' });
            if (res.ok) {
                const data = await res.json();
                updateRoverUI(data.x, data.y, data.direction);
            }
        } catch (e) {
            console.error("Reset Failed:", e);
            showError('Reset failed');
        }
    }

    document.getElementById('cmdInput').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
            runSequence();
        }
    });

    // Initialize
    initGrid();
    fetchStatus();

</script>
</body>
</html>
